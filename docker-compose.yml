version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: identify_db
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=identify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: identify_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://app:secret@db:5432/identify
      - UPLOAD_DIR=/app/uploads
      - SYNC_TOKEN_SECRET=your-super-secret-sync-token-change-in-production
      - LOG_LEVEL=INFO
    volumes:
      - ${PWD}/server/uploads:/app/uploads
      - ./server/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Label Generator (optional for testing)
  labelgen:
    build:
      context: ./labelgen
      dockerfile: Dockerfile
    container_name: identify_labelgen
    profiles: [labelgen]
    volumes:
      - ${PWD}/labelgen/examples:/app/examples

volumes:
  postgres_data:
    driver: local
