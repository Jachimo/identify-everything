name: Label Generator Tests

on:
  push:
    branches: [ main ]
  pull_request:
    paths: ['labelgen/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Lint with Black
        run: |
          pip install black
          black --check labelgen/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r labelgen/requirements.txt
      - name: Run tests
        run: |
          cd labelgen
          pytest tests/ -v
      - name: Generate coverage report
        run: |
          cd labelgen
          pytest tests/ --cov=labelgen --cov-report=xml

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./labelgen
          push: true
          tags: |
            myusername/identify-labelgen:${{ github.sha }}
            myusername/identify-labelgen:latest
