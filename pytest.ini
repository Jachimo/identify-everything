[pytest]
# Run from the project root:
#   PYTHONPATH=server python -m pytest server/tests/ -v
#
# Or, with coverage:
#   PYTHONPATH=server python -m pytest server/tests/ -v --cov=identify --cov-report=term-missing

testpaths = server/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show local variables in tracebacks for easier debugging
addopts = -v --tb=short
